spring:
  application:
    name: ms-auth-service-test

  cloud:
    config:
      enabled: false
    discovery:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

jwt:
  secret: secret-test-auth-service
  expiration: 3600000
