spring:
  application:
    name: ms-auth-service-test

  cloud:
    config:
      enabled: false
    discovery:
      enabled: false

  datasource:
    url: jdbc:mysql://localhost:3306/authdbtest?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

jwt:
  secret: secret-test-auth-service
  expiration: 3600000
